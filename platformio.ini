; PlatformIO Configuration for DOPE / Ballistic Core Engine
; Two environments: esp32p4 (target hardware) and native (desktop testing)

[env]
lib_deps =
lib_extra_dirs = lib
build_flags =
    -std=gnu++17
    -DDOPE_VERSION_MAJOR=2
    -DDOPE_VERSION_MINOR=0
    -Wall
    -Wextra


[env:esp32sim]
platform = espressif32
board = esp32dev
framework = espidf
build_flags =
    ${env.build_flags}
    -DDOPE_PLATFORM_ESP32

[env:native]
platform = native
test_build_src = false
build_flags =
    -std=c++17
    -DDOPE_PLATFORM_NATIVE
    -DDOPE_DEBUG_UNCERTAINTY
    -DDOPE_VERSION_MAJOR=2
    -DDOPE_VERSION_MINOR=0
    -Wall
    -Wextra
    -Ithird_party
test_framework = googletest

[env:native_engine]
platform = native
build_flags =
    -std=c++17
    -DDOPE_PLATFORM_NATIVE
    -DDOPE_VERSION_MAJOR=2
    -DDOPE_VERSION_MINOR=0
    -Wall
    -Wextra
    -Ithird_party

[env:native_gui]
platform = native
build_src_filter =
    +<../tools/native_gui/gui_main.cpp>
    +<../tools/native_gui/imgui_all.cpp>
    +<../tools/native_gui/imgui_impl_win32_wrap.cpp>
    +<../tools/native_gui/imgui_impl_dx11_wrap.cpp>
build_flags =
    -std=c++17
    -DDOPE_PLATFORM_NATIVE
    -DDOPE_VERSION_MAJOR=2
    -DDOPE_VERSION_MINOR=0
    -Wall
    -Wextra
    -DUNICODE
    -D_UNICODE
    -Ithird_party/imgui
    -Ithird_party
    -Ithird_party/imgui/backends
    -luser32
    -lgdi32
    -lcomdlg32
    -lcomctl32
    -limm32
    -ld3d11
    -ldxgi
    -ld3dcompiler
    -ldwmapi
    -mconsole

[env:native_gui_linux]
platform = native
build_src_filter =
    +<../tools/native_gui/gui_main.cpp>
    +<../tools/native_gui/imgui_all.cpp>
    +<../tools/native_gui/imgui_impl_glfw_wrap.cpp>
    +<../tools/native_gui/imgui_impl_opengl3_wrap.cpp>
build_flags =
    -std=c++17
    -DDOPE_PLATFORM_NATIVE
    -DDOPE_VERSION_MAJOR=2
    -DDOPE_VERSION_MINOR=0
    -Wall
    -Wextra
    -Ithird_party/imgui
    -Ithird_party
    -Ithird_party/imgui/backends
    -lGL
    -lglfw
    -ldl
